<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Большой Дом — Проектно-строительная компания</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="container">
      <div class="header-inner">
        <a href="#" class="header-logo"><img src="img/logo.svg" alt="Большой Дом"></a>
        <div class="header-center">
          <a href="mailto:info@bighouse.ru" class="header-email"><i class="bi bi-envelope"></i> info@bighouse.ru</a>
        </div>
        <div class="header-right">
          <button class="btn-brand btn-brand-sm">
            <i class="bi bi-telephone me-1"></i>
            <span class="d-none d-sm-inline">Обратная связь</span>
            <span class="d-sm-none">Связаться</span>
          </button>
        </div>
      </div>
    </div>
  </header>
  <!-- Hero -->
  <section class="hero" id="home">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-7 mb-4 mb-lg-0">
          <div class="hero-content">
            <h1><span class="brand-name">Большой дом</span> — динамичная многопрофильная проектно-строительная компания</h1>
            <p class="hero-subtitle">Работаем в следующих секторах:</p>
            <div class="hero-sectors">
              <span class="sector-tag">Технический</span>
              <span class="sector-tag">Жилой</span>
              <span class="sector-tag">Коммерческий</span>
            </div>
            <div class="hero-buttons">
              <a href="#contact" class="btn-brand"><i class="bi bi-pencil-square me-1"></i> Оставить заявку</a>
              <a href="#about" class="btn-brand-outline">Подробнее</a>
            </div>
          </div>
        </div>
        <div class="col-lg-5 d-none d-md-block">
          <div class="phone-wrapper">
            <div class="phone-mockup">
              <div class="phone-screen">
                <div class="phone-notch"></div>
                <div class="phone-app-icon">🏠</div>
                <div class="phone-app-title">Большой Дом</div>
                <div class="phone-app-desc">Управление проектом<br>строительства</div>
                <div class="phone-app-btn">Открыть проект</div>
                <div class="phone-nav">
                  <div class="phone-nav-dot active"></div>
                  <div class="phone-nav-dot"></div>
                  <div class="phone-nav-dot"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
